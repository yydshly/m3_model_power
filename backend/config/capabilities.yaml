    requires_confirmation_above_chars: 1000
    hard_block_above_chars_without_confirm: 5000
    operation_note: 异步长文本语音可能消耗大量字符额度；<=300字允许默认测试；>1000字需二次确认；>5000字无显式确认禁止执行
