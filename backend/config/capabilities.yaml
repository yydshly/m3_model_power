  - tts
  - long
  billing_policy:
    billing_category: quota_sensitive
    requires_explicit_confirmation: false
    may_charge_extra: false
    consumes_token_plan_quota: true
    requires_certification: false
    requires_uploaded_asset: false
    billing_note: 消耗 TokenPlan 语音/字符额度；长文本可能大量消耗额度；pending 正式验收
    official_pricing_note: ''
  operation_policy:
    operation_risk: quota_guarded
    requires_operation_confirmation: true
    requires_uploaded_asset: false
    requires_existing_task: false
    is_destructive: false
    is_long_running: true
