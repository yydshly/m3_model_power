  - id: I2V-01
    label: I2V-01
    family: video
    tier: standard
    quota_eligible: false
    capabilities: [video-i2v]
    note: 上一代图生视频。
    enabled: true

  - id: I2V-01-live
    label: I2V-01-live
    family: video
    tier: standard
    quota_eligible: false
    capabilities: [video-i2v]
    note: 2D 角色专用图生视频。
    enabled: true

  - id: I2V-01-Director
    label: I2V-01-Director
    family: video
    tier: standard
