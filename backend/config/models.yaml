# MiniMax 模型清单 —— 工作台所有"模型下拉"都从这里取。
#
# 字段：
#   id              上游 model 字段实际值（API 调用直接用它）
#   label           UI 显示名
#   family          chat | speech | image | video | music
#   capabilities    显式声明这个模型支持哪些 capability id；不写则按 family 自动匹配
#   tier            flagship | highspeed | standard | legacy
#                     ★ highspeed = TokenPlanPlus 极速档专属变体，走共享配额
#   quota_eligible  true=走 TokenPlanPlus 配额；false=单独按 token 计费
#                     ★ 这是订阅"极速版"的关键字段：调用 -highspeed 才能真正"吃配额"
#   multimodal      是否支持图像/视频输入（仅 chat）
#   context         最大上下文长度
#   protocols       [openai, anthropic, responses]
#   note            UI 提示文案
#   enabled         false 则不显示

models:
  # ===================== 对话 / LLM =====================

  # 极速档 —— TokenPlanPlus 月度 12 亿+ 配额覆盖
  # 注意：highspeed 后缀只在文档明确列出的型号上加，不要从其他型号外推。
  - id: MiniMax-M2.7-highspeed
    label: MiniMax M2.7 (极速档)
    family: chat
    tier: highspeed
    quota_eligible: true
    multimodal: false
    context: 245760
    protocols: [openai]
    note: ★ 极速档下的 M2.7 变体，走 TokenPlanPlus 共享配额（用户在 docs 中确认存在）。
    enabled: true

  # 标准档 —— 按 token 单独计费，不吃极速档配额
  - id: MiniMax-M3
    label: MiniMax M3
    family: chat
    tier: flagship
    quota_eligible: false
    multimodal: true
    context: 1000000
    protocols: [openai, anthropic, responses]
    note: 标准档 M3，按 token 单独计费。走极速档配额请用 MiniMax-M3-highspeed。
    enabled: true

  - id: MiniMax-M2.7
    label: MiniMax M2.7
    family: chat
    tier: standard
    quota_eligible: false
    multimodal: false
    context: 245760
    protocols: [openai]
    note: 标准档 M2.7，按 token 单独计费。
    enabled: true

  - id: abab6.5s-chat
    label: abab 6.5s
    family: chat
    tier: legacy
    quota_eligible: false
    multimodal: false
    context: 245760
    protocols: [openai]
    note: 上一代旗舰，按 token 单独计费。
    enabled: true

  - id: abab6.5-chat
    label: abab 6.5
    family: chat
    tier: legacy
    quota_eligible: false
    multimodal: false
    context: 8192
    protocols: [openai]
    note: 历史版本，保留兼容。
    enabled: true

  - id: abab6.5t-chat
    label: abab 6.5t
    family: chat
    tier: legacy
    quota_eligible: false
    context: 8192
    protocols: [openai]
    note: abab 6.5 变体。
    enabled: true

  - id: abab6.5g-chat
    label: abab 6.5g
    family: chat
    tier: legacy
    quota_eligible: false
    context: 8192
    protocols: [openai]
    note: abab 6.5 变体。
    enabled: true

  # ===================== 语音 =====================
  - id: speech-2.5-hd-preview
    label: speech-2.5-hd (preview)
    family: speech
    tier: flagship
    quota_eligible: false
    note: 最新一代高保真，preview 阶段。
    enabled: true

  - id: speech-2.5-turbo-preview
    label: speech-2.5-turbo (preview)
    family: speech
    tier: flagship
    quota_eligible: false
    note: 最新一代低延迟，preview 阶段。
    enabled: true

  - id: speech-02-hd
    label: speech-02-hd
    family: speech
    tier: standard
    quota_eligible: false
    note: 高保真合成，推荐用于成片/有声书。
    enabled: true

  - id: speech-02-turbo
    label: speech-02-turbo
    family: speech
    tier: standard
    quota_eligible: false
    note: 低延迟优先，适合实时交互。
    enabled: true

  - id: speech-01-hd
    label: speech-01-hd
    family: speech
    tier: legacy
    quota_eligible: false
    note: 上一代高保真。
    enabled: true

  - id: speech-01-turbo
    label: speech-01-turbo
    family: speech
    tier: legacy
    quota_eligible: false
    note: 上一代低延迟。
    enabled: true

  - id: speech-01-240228
    label: speech-01-240228
    family: speech
    tier: legacy
    quota_eligible: false
