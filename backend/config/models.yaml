# MiniMax 模型清单 —— 工作台所有"模型下拉"都从这里取。
#
# 字段：
#   id                  上游 model 字段实际值（API 调用直接用它）
#   label               UI 显示名
#   family              chat | speech | image | video | music
#   tier                flagship | highspeed | standard | hd | turbo | legacy | deprecated
#   official_current    官方当前文档是否列出该模型
#   live_available      真实 API /v1/models 是否返回（null=未验收，models_api 不返回 non-chat 模型）
#   subscription_expected  用户订阅套餐是否覆盖该模型
#   enabled             前端默认显示（false 则隐藏）
#   context             最大上下文长度（仅 chat 系列）
#   input_modalities   输入模态：[text] | [text, image, video]
#   output_modalities   输出模态：[text] | [text, image, video, audio, music]
#   protocols           [openai] | [anthropic] | [openai, anthropic] | [openai, anthropic, responses]
#   capabilities        显式声明这个模型支持哪些 capability id
#   supports_tools       是否支持工具调用
#   supports_thinking    是否支持 thinking block
#   thinking_can_disable thinking 是否可关闭
#   cost_level           quota | low | medium | high | unknown
#   discovery_method     models_api | capability_probe | manual_official | null
#                         models_api = 通过 /v1/models 列表接口验证
#                         capability_probe = 需要通过实际能力端点验证（如 tts-sync/image-t2i）
#                         manual_official = 仅官方文档确认，未做 live 验证
#   discovery_status    available | unavailable | not_applicable | unknown | null
#   discovery_note      补充说明
#   note                UI 提示文案
#
# 重要原则：
#   official_current ≠ live_available ≠ subscription_expected，三类状态独立维护。

